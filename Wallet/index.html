<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="ambient__glow" id="ambientGlow"></div>
    <div class="ambient__noise"></div>
    <div class="ambient__vignette"></div>
  </div>

  <main class="wallet-app" aria-live="polite">
    <header class="wallet-header">
      <p class="wallet-header__kicker">Wallet</p>
      <h1 class="wallet-header__title" id="activeTitle">Loading cards...</h1>
      <p class="wallet-header__subtitle" id="statusText">Swipe left or right</p>
    </header>

    <section class="wallet-stage is-collapsed" id="walletStage" aria-label="Wallet cards">
      <div class="cards-track" id="cardsTrack" role="list"></div>
    </section>

    <footer class="wallet-footer">
      <span class="wallet-index" id="activeIndex">0/0</span>
      <button class="wallet-action" id="toggleExpandBtn" type="button">Open Card</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
