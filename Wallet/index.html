<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Offline-first PWA wallet for loyalty cards and barcode images.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Wallet">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <title>Wallet</title>
</head>
<body>
  <div class="app-shell">
    <div class="background-glow" aria-hidden="true"></div>

    <div class="banner" id="installBanner" hidden>
      <div>
        <strong>Установить Wallet</strong>
        <span>Приложение будет открываться как отдельное PWA.</span>
      </div>
      <button type="button" class="text-button" id="installButton">Установить</button>
    </div>

    <div class="banner" id="updateBanner" hidden>
      <div>
        <strong>Доступно обновление</strong>
        <span>Загрузите свежую офлайн-версию приложения.</span>
      </div>
      <button type="button" class="text-button" id="updateButton">Обновить</button>
    </div>

    <div class="banner" id="offlineBanner" hidden>
      <div>
        <strong>Офлайн-режим</strong>
        <span>Карты и штрихкоды загружаются из кэша.</span>
      </div>
      <button type="button" class="icon-button icon-button--small" id="offlineDismiss" aria-label="Скрыть">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18"></path>
        </svg>
      </button>
    </div>

    <main class="pages" id="pages">
      <section class="page page--home is-active" id="homePage" data-page="home" aria-labelledby="homeTitle">
        <header class="page-header">
          <div>
            <p class="eyebrow">Wallet</p>
            <h1 id="homeTitle">Главная</h1>
          </div>
          <button type="button" class="icon-button" id="quickFavorites" aria-label="Избранное">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 4h10a2 2 0 0 1 2 2v14l-7-3.6L5 20V6a2 2 0 0 1 2-2Z"></path>
            </svg>
          </button>
        </header>

        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4.4-4.4"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Найти карту">
        </label>

        <section class="section" aria-labelledby="favoritesTitle">
          <div class="section-header">
            <h2 id="favoritesTitle">Избранное</h2>
            <span id="favoriteCountLabel">0</span>
          </div>
          <div class="favorites-strip" id="favoritesGrid"></div>
        </section>

        <section class="section" aria-labelledby="cardsTitle">
          <div class="section-header">
            <h2 id="cardsTitle">Все карты</h2>
            <span id="totalCardsLabel">0</span>
          </div>
          <div class="wallet-grid" id="walletGrid"></div>
          <div class="empty-state" id="emptyState" hidden>Карты не найдены.</div>
        </section>
      </section>

      <section class="page page--catalog" id="catalogPage" data-page="catalog" aria-labelledby="catalogTitle">
        <header class="page-header">
          <div>
            <p class="eyebrow">Справочник</p>
            <h1 id="catalogTitle">Каталог</h1>
          </div>
        </header>
        <div class="catalog-grid" id="catalogGrid"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Навигация">
      <button type="button" class="nav-item is-active" data-nav="home" aria-label="Главная">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9.5Z"></path>
        </svg>
        <span>Главная</span>
      </button>
      <button type="button" class="nav-item" data-nav="catalog" aria-label="Каталог">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 5h5v5H5V5Zm9 0h5v5h-5V5ZM5 14h5v5H5v-5Zm9 0h5v5h-5v-5Z"></path>
        </svg>
        <span>Каталог</span>
      </button>
    </nav>
  </div>

  <section class="detail-overlay" id="detailOverlay" aria-hidden="true">
    <div class="detail-sheet" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="detail-actions">
        <button type="button" class="icon-button" id="closeDetailButton" aria-label="Назад">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 6-6 6 6 6"></path>
          </svg>
        </button>
        <h2 id="detailTitle">Карта</h2>
        <button type="button" class="icon-button favorite-button" id="toggleFavoriteButton" aria-label="Избранное">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4h10a2 2 0 0 1 2 2v14l-7-3.6L5 20V6a2 2 0 0 1 2-2Z"></path>
          </svg>
        </button>
      </div>

      <div class="detail-card" id="detailHero">
        <div>
          <p class="eyebrow">Карта лояльности</p>
          <strong id="detailBrand">Wallet</strong>
        </div>
      </div>

      <div class="barcode-panel">
        <div class="barcode-box" id="barcodeBox"></div>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="./app.js" defer></script>
</body>
</html>
