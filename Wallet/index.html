<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Offline-first PWA wallet for loyalty cards and barcode images.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Wallet">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css?v=2026.04.2">
  <title>Wallet</title>
</head>
<body>
  <div class="app-shell">
    <div class="background-glow" aria-hidden="true"></div>

    <div class="banner" id="installBanner" hidden>
      <div>
        <strong>Установить Wallet</strong>
        <span>Приложение будет открываться как отдельное PWA.</span>
      </div>
      <button type="button" class="text-button" id="installButton">Установить</button>
    </div>

    <div class="banner" id="offlineBanner" hidden>
      <div>
        <strong>Офлайн-режим</strong>
        <span>Карты и штрихкоды загружаются из кэша.</span>
      </div>
      <button type="button" class="icon-button icon-button--small" id="offlineDismiss" aria-label="Скрыть">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18"></path>
        </svg>
      </button>
    </div>

    <main class="pages" id="pages">
      <section class="page page--home is-active" id="homePage" data-page="home">
        <header class="page-header">
          <div>
            <p class="eyebrow">Wallet</p>
            <h1 class="visually-hidden">Wallet</h1>
          </div>
          <div class="app-menu-wrap">
            <button type="button" class="icon-button menu-button" id="appMenuButton" aria-label="Меню" aria-expanded="false" aria-controls="appMenu">
              <span aria-hidden="true">&#8942;</span>
            </button>
            <div class="app-menu" id="appMenu" hidden>
              <div class="version-row">
                <span>Текущая версия</span>
                <strong id="currentVersionLabel">-</strong>
              </div>
              <div class="version-row">
                <span>Последняя версия</span>
                <strong id="latestVersionLabel">-</strong>
              </div>
              <button type="button" class="text-button menu-update-button" id="forceUpdateButton">Force Update</button>
            </div>
          </div>
        </header>

        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4.4-4.4"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Найти карту">
        </label>

        <section class="section" aria-labelledby="favoritesTitle">
          <div class="section-header">
            <h2 id="favoritesTitle">Избранное</h2>
            <span id="favoriteCountLabel">0</span>
          </div>
          <div class="favorites-strip" id="favoritesGrid"></div>
        </section>

        <section class="section" aria-labelledby="cardsTitle">
          <div class="section-header">
            <h2 id="cardsTitle">Все карты</h2>
            <span id="totalCardsLabel">0</span>
          </div>
          <div class="wallet-grid" id="walletGrid"></div>
          <div class="empty-state" id="emptyState" hidden>Карты не найдены.</div>
        </section>
      </section>
    </main>

  </div>

  <section class="detail-overlay" id="detailOverlay" aria-hidden="true">
    <div class="detail-sheet" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="detail-actions">
        <button type="button" class="icon-button" id="closeDetailButton" aria-label="Назад">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 6-6 6 6 6"></path>
          </svg>
        </button>
        <h2 id="detailTitle">Карта</h2>
        <span aria-hidden="true"></span>
      </div>

      <div class="barcode-panel">
        <div class="barcode-box" id="barcodeBox"></div>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="./app.js?v=2026.04.2" defer></script>
</body>
</html>
