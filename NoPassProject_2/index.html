<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoPass Web App</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f7;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}

button {
    background: #27ae60;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    padding: 10px;
    background: #ecf0f1;
    border-radius: 8px;
    word-break: break-all;
}

.section {
    margin-top: 15px;
}

.checkbox-group {
    display: flex;
    justify-content: space-between;
}

.strength {
    font-weight: bold;
    margin-top: 10px;
}

.details {
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
<h2>🔐 NoPass Generator</h2>

<div id="status">⏳ Загрузка Python...</div>

<div class="section">
<input id="salt" type="password" placeholder="🧂 Соль (секрет)">
<input id="login" placeholder="👤 Логин">
</div>

<div class="section">
<label>📏 Длина пароля:</label>
<input id="length" type="number" value="16" min="8" max="32">
</div>

<div class="section">
<label>⚙️ Настройки:</label>
<div class="checkbox-group">
<label><input type="checkbox" id="digits" checked> 0-9</label>
<label><input type="checkbox" id="upper" checked> A-Z</label>
</div>
<div class="checkbox-group">
<label><input type="checkbox" id="lower" checked> a-z</label>
<label><input type="checkbox" id="symbols" checked> !@#</label>
</div>
</div>

<button onclick="generate()">🚀 СГЕНЕРИРОВАТЬ</button>

<div class="result" id="result" style="display:none;">
<div id="password"></div>
<button onclick="copyPassword()">📋 Копировать</button>

<div class="strength" id="strength"></div>
<div class="details" id="details"></div>
</div>

</div>

<script>
let pyodide;
let ready = init();

async function init() {
    pyodide = await loadPyodide();

    const response = await fetch("NoPass_Deepseek_222.py");
    const code = await response.text();

    await pyodide.runPythonAsync(code);

    document.getElementById("status").innerText = "✅ Готово";
}

async function generate() {
    await ready;

    const salt = document.getElementById("salt").value;
    const login = document.getElementById("login").value;
    const length = parseInt(document.getElementById("length").value);

    const digits = document.getElementById("digits").checked;
    const upper = document.getElementById("upper").checked;
    const lower = document.getElementById("lower").checked;
    const symbols = document.getElementById("symbols").checked;

    if (!salt || !login) {
        alert("Введите логин и соль");
        return;
    }

    try {
        pyodide.globals.set("login_js", login);
        pyodide.globals.set("salt_js", salt);
        pyodide.globals.set("length_js", length);
        pyodide.globals.set("digits_js", digits);
        pyodide.globals.set("upper_js", upper);
        pyodide.globals.set("lower_js", lower);
        pyodide.globals.set("symbols_js", symbols);

        const result = await pyodide.runPythonAsync(`
generate_from_web(
    login_js,
    salt_js,
    length_js,
    digits_js,
    upper_js,
    lower_js,
    symbols_js
)
        `);

        const data = result.toJs();

        document.getElementById("result").style.display = "block";
        document.getElementById("password").innerText = data.password;
        document.getElementById("strength").innerText = "Сложность: " + data.strength;
        document.getElementById("details").innerText = data.details.join(", ");

    } catch (err) {
        console.error(err);
        alert("Ошибка: " + err);
    }
}

function copyPassword() {
    const text = document.getElementById("password").innerText;
    navigator.clipboard.writeText(text);
    alert("Пароль скопирован");
}
</script>

</body>
</html>
