<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoPass Pyodide</title>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f4f6f7; }
.container { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; }
input, button { width:100%; padding:10px; margin:5px 0; }
button { background:#27ae60; color:white; font-weight:bold; border:none; border-radius:5px; cursor:pointer; }
.result { margin-top:15px; font-size:18px; word-break:break-all; }
.checkbox-group { display:flex; justify-content:space-between; margin:10px 0; }
.checkbox-group label { display:flex; align-items:center; gap:5px; }
</style>
</head>

<body>
<div class="container">
<h2>🔐 NoPass Password Generator</h2>

<input id="salt" type="password" placeholder="Соль (секретное слово)">
<input id="login" placeholder="Логин (например, email)">
<input id="length" type="number" value="16" min="8" max="32">

<div class="checkbox-group">
  <label><input type="checkbox" id="digits" checked> Цифры 0-9</label>
  <label><input type="checkbox" id="upper" checked> Заглавные A-Z</label>
</div>
<div class="checkbox-group">
  <label><input type="checkbox" id="lower" checked> Строчные a-z</label>
  <label><input type="checkbox" id="symbols" checked> Спецсимволы !@#$%</label>
</div>

<button onclick="generate()">🚀 Сгенерировать</button>
<div class="result" id="result"></div>
</div>

<script>
let pyodideReady = loadPyodide();

async function generate() {
    const pyodide = await pyodideReady;

    const salt = document.getElementById("salt").value;
    const login = document.getElementById("login").value;
    const length = parseInt(document.getElementById("length").value);

    const useDigits = document.getElementById("digits").checked;
    const useUpper = document.getElementById("upper").checked;
    const useLower = document.getElementById("lower").checked;
    const useSymbols = document.getElementById("symbols").checked;

    if (!salt || !login) {
        alert("Введите соль и логин!");
        return;
    }

    if (length < 8 || length > 32) {
        alert("Длина пароля должна быть от 8 до 32 символов");
        return;
    }

    try {
        const code = `
import string

def generate_from_web(login, salt, length, use_digits, use_upper, use_lower, use_symbols):
    key_int = sum([ord(c) for c in (login+salt)]) * 9999
    key_str = str(key_int)

    charsets = ''
    if use_digits: charsets += string.digits
    if use_upper: charsets += string.ascii_uppercase
    if use_lower: charsets += string.ascii_lowercase
    if use_symbols: charsets += '!@#$%^&*()-+'

    if not charsets:
        charsets = string.ascii_letters + string.digits

    password = ''
    for i in range(length):
        idx = int(key_str[i % len(key_str)]) % len(charsets)
        password += charsets[idx]
    return password

generate_from_web(
    "${login}",
    "${salt}",
    ${length},
    ${useDigits ? "True" : "False"},
    ${useUpper ? "True" : "False"},
    ${useLower ? "True" : "False"},
    ${useSymbols ? "True" : "False"}
)
`;

        const result = await pyodide.runPythonAsync(code);
        document.getElementById("result").innerText = result;
    } catch (err) {
        document.getElementById("result").innerText = "Ошибка генерации: " + err;
    }
}
</script>
</body>
</html>
