<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoPass Pyodide</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f4f6f7; }
.container { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; }
input, button { width:100%; padding:10px; margin:5px 0; }
button { background:#27ae60; color:white; font-weight:bold; cursor:pointer; }
.result { margin-top:15px; font-size:18px; word-break:break-all; }
.details { font-size:14px; color:#555; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
<h2>🔐 NoPass (Python в браузере)</h2>

<input id="salt" type="password" placeholder="Соль">
<input id="login" placeholder="Логин">

<input id="length" type="number" value="16" min="8" max="32">

<label><input type="checkbox" id="digits" checked> Цифры</label>
<label><input type="checkbox" id="upper" checked> Заглавные</label>
<label><input type="checkbox" id="lower" checked> Строчные</label>
<label><input type="checkbox" id="symbols" checked> Символы</label>

<button onclick="generate()">🚀 Сгенерировать</button>

<div class="result" id="result"></div>
<div class="details" id="details"></div>
</div>

<script>
let pyodideReady = loadPyodide();

async function generate() {
    const pyodide = await pyodideReady;

    const salt = document.getElementById("salt").value;
    const login = document.getElementById("login").value;
    const length = parseInt(document.getElementById("length").value);
    const digits = document.getElementById("digits").checked;
    const upper = document.getElementById("upper").checked;
    const lower = document.getElementById("lower").checked;
    const symbols = document.getElementById("symbols").checked;

    if (!salt || !login) { alert("Введите данные"); return; }

    const code = `
import hashlib
import string

def generate_password(login, salt, length, use_digits, use_upper, use_lower, use_symbols):
    base = f"{login}:{salt}"
    hash_hex = hashlib.sha256(base.encode()).hexdigest()
    alphabet = ""
    if use_digits: alphabet += string.digits
    if use_upper: alphabet += string.ascii_uppercase
    if use_lower: alphabet += string.ascii_lowercase
    if use_symbols: alphabet += "!@#$%^&*()-_=+[]{};:,.<>?"
    if not alphabet: raise ValueError("Выберите хотя бы один набор символов")
    password = ""
    for i in range(length):
        idx = int(hash_hex[i % len(hash_hex)], 16) % len(alphabet)
        password += alphabet[idx]
    return password

def analyze_strength(password):
    score = 0
    details = []
    if len(password) >= 12: score += 1; details.append("Длина ≥12")
    if any(c.isdigit() for c in password): score += 1; details.append("Есть цифры")
    if any(c.islower() for c in password): score += 1; details.append("Есть строчные")
    if any(c.isupper() for c in password): score += 1; details.append("Есть заглавные")
    if any(c in "!@#$%^&*()-_=+[]{};:,.<>?" for c in password): score += 1; details.append("Есть символы")
    if score <=2: strength="Слабый"
    elif score <=4: strength="Средний"
    else: strength="Сильный"
    return strength, details

pwd = generate_password("${login}", "${salt}", ${length}, ${digits}, ${upper}, ${lower}, ${symbols})
strength, details = analyze_strength(pwd)
pwd, strength, details
`;

    try {
        const result = await pyodide.runPythonAsync(code);
        document.getElementById("result").innerText = result[0];
        document.getElementById("details").innerText = result[1] + ": " + result[2].join(", ");
    } catch (e) {
        alert("Ошибка Python: " + e);
    }
}
</script>

</body>
</html>
